<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YÊU CÁC CON VỢ 12A2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
-webkit-tap-highlight-color:transparent;
}

/* ================= GALAXY BACKGROUND ================= */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,rgba(255,0,150,.35),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,200,255,.35),transparent 40%),
radial-gradient(circle at 50% 50%,rgba(120,0,255,.25),transparent 60%);
animation:nebula 25s linear infinite alternate;
z-index:-3;
}

@keyframes nebula{
0%{transform:scale(1)}
100%{transform:scale(1.3)}
}

canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* ================= INTRO ================= */

.intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:1000;
}

.logo{
font-size:clamp(60px,12vw,150px);
font-weight:900;
letter-spacing:8px;
background:linear-gradient(270deg,#ff00cc,#00ffff,#ff66ff,#00ccff);
background-size:400% 400%;
-webkit-background-clip:text;
color:transparent;
animation:logoAppear 2.5s ease forwards,logoGradient 6s ease infinite;
}

@keyframes logoAppear{
0%{opacity:0;transform:scale(.6)}
100%{opacity:1;transform:scale(1)}
}

@keyframes logoGradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= HERO ================= */

.hero{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
transition:1s;
}

.hero.fade-out{
opacity:0;
transform:translate(-50%,-60%) scale(.8);
filter:blur(8px);
}

.hero.hide{
display:none;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:clamp(32px,8vw,70px);
background:linear-gradient(90deg,#ff4d88,#66ccff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 40px #ff4d88;
animation:titleFloat 4s infinite ease-in-out;
}

@keyframes titleFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* ================= BUTTON ================= */

.btn{
padding:14px 32px;
border-radius:50px;
border:none;
background:linear-gradient(45deg,#ff4d88,#d63384);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff4d88;
}

.btn:active{
transform:scale(.95);
}

.music-btn{position:fixed;bottom:15px;left:15px;display:none}
.process-btn{position:fixed;bottom:15px;right:15px;display:none}

/* ================= LETTER ================= */

.letter-btn{
position:fixed;
bottom:75px;
right:15px;
display:none;
background:linear-gradient(45deg,#ff66cc,#ff1493);
box-shadow:0 0 15px #ff66cc;
}

.letter-box{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.5s;
z-index:900;
}

.letter-box.active{
opacity:1;
pointer-events:auto;
}

.letter-content{
background:linear-gradient(135deg,#ff99cc,#ff66cc);
padding:40px;
border-radius:25px;
width:90%;
max-width:500px;
text-align:center;
color:white;
box-shadow:0 0 40px #ff66cc;
}

/* ================= FLOAT IMAGE ================= */

.float-img{
position:fixed;
width:110px;
height:170px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,100,255,.8);
animation:riseImage 8s linear forwards;
z-index:1;   
}

.float-img img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes riseImage{
0%{transform:translateY(110vh) scale(.8);opacity:0}
20%{opacity:1}
100%{transform:translateY(-30vh);opacity:0}
}

/* ================= WISH ================= */

.wish{
position:fixed;
font-weight:600;
color:#ff85a2;
animation:riseWish 6s linear forwards;
}

@keyframes riseWish{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-20vh);opacity:0}
}

/* ================= FLOWER ================= */

.flower{
position:fixed;
width:40px;
height:40px;
pointer-events:none;
animation:fall linear forwards;
background:none;
}

.flower img{
width:100%;
height:100%;
object-fit:contain;
background:transparent;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh);opacity:0}
}

/* ================= HEART ================= */

.heart{
position:fixed;
pointer-events:none;
font-size:16px;
will-change:transform,opacity;
animation:heartFly 1.1s cubic-bezier(.22,.68,.42,1) forwards;
filter:drop-shadow(0 0 6px currentColor);
}

@keyframes heartFly{
0%{
opacity:1;
transform:translate3d(0,0,0) scale(1);
}
100%{
opacity:0;
transform:translate3d(var(--moveX),var(--moveY),0) scale(1.5) rotate(360deg);
}
}

/* ================= VIDEO ================= */

.video-slide{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.6s;
z-index:2000;
}

.video-slide.active{
opacity:1;
pointer-events:auto;
}

.video-slide video{
width:100%;
height:100%;
object-fit:cover;
}

.video-controls{
position:absolute;
top:20px;
left:20px;
}

</style>
</head>

<body>

<div class="intro" id="intro">
<div class="logo" id="logo">12A2</div>
</div>

<canvas id="sky"></canvas>

<button class="btn music-btn" id="musicBtn" onclick="toggleMusic()">🎵 MUZIC AZAI A2</button>
<audio id="bgMusic" loop>
<source src="Low G _ In Love (ft. JustaTee) _ ‘L2K’ The Album - (320 Kbps).mp3" type="audio/mpeg">
</audio>

<div class="hero" id="hero">
<h1>Chúc Mừng 08/03 💐</h1>
<br><br>
<button class="btn" onclick="startShow()">Bắt Đầu</button>
</div>

<button class="btn process-btn" id="processBtn" onclick="openVideo()">🎬 Xem Quá Trình</button>
<button class="btn letter-btn" id="letterBtn" onclick="openLetter()">💌 THƯ</button>

<div class="letter-box" id="letterBox">
<div class="letter-content">
<h2>💖 Thư Gửi 12A2 💖</h2>
<p>
Chúc tất cả các bạn nữ 12A2 luôn xinh đẹp, tự tin và hạnh phúc.
Mãi rực rỡ như bầu trời sao đêm nay 🌌✨
</p>
<br>
<button class="btn" onclick="closeLetter()">Đóng</button>
</div>
</div>

<div class="video-slide" id="videoSlide">
    <div class="video-controls">
        <button class="btn" onclick="closeVideo()">⬅ Quay Lại</button>
    </div>

    <video id="processVideo" controls playsinline>
        <source src="LINK_VIDEO.mp4" type="video/mp4">
    </video>
</div>

<script>

/* ================= INTRO FIX ================= */

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("logo").style.opacity="0";
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},1000);
},2500);
});

/* ================= STAR FIX ================= */

const canvas=document.getElementById("sky");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        s.y+=s.d;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}
draw();
/* ================= DATA ================= */

const wishes=[
"Luôn xinh đẹp 💖","Luôn thành công ✨","Hạnh phúc trọn vẹn 🌸",
"Tỏa sáng mỗi ngày 🌟","Mãi rạng rỡ như ánh sao 🌌",
"Chúc 8/3 thật tuyệt vời 💐","Luôn mạnh mẽ và tự tin 💎"
]; 

const images = [
  "4.jpg",
  "5.jpg",
  "6.jpg"
];

/* ================= START ================= */

function startShow(){
document.getElementById("hero").classList.add("fade-out");
setTimeout(()=>{
document.getElementById("hero").classList.add("hide");
document.getElementById("musicBtn").style.display="block";
document.getElementById("processBtn").style.display="block";
document.getElementById("letterBtn").style.display="block";

setInterval(createImage,2200);
setInterval(createWish,1600);
setInterval(createFlower,800);

},1000);
}

function createImage(){
if(!images.length) return;
let box=document.createElement("div");
box.className="float-img";
box.style.left=Math.random()*80+"vw";
let img=document.createElement("img");
img.src=images[Math.floor(Math.random()*images.length)];
box.appendChild(img);
document.body.appendChild(box);
setTimeout(()=>box.remove(),8000);
}

function createWish(){
let t=document.createElement("div");
t.className="wish";
t.innerHTML=wishes[Math.floor(Math.random()*wishes.length)];
t.style.left=Math.random()*80+"vw";
document.body.appendChild(t);
setTimeout(()=>t.remove(),6000);
}

function createFlower(){

let f=document.createElement("div");
f.className="flower";

f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(6+Math.random()*3)+"s";

let img=document.createElement("img");
img.src="3.png";   

f.appendChild(img);

document.body.appendChild(f);

setTimeout(()=>{
f.remove();
},9000);

}

/* ================= SMOOTH RAINBOW HEART ================= */

const heartIcons=["💖","💗","💓","💘","💝","💞","❤️"];

let mouseX=0;
let mouseY=0;
let canSpawn=true;

function randomColor(){
return `hsl(${Math.random()*360},100%,60%)`;
}

function createHeart(x,y,burst=false){

let h=document.createElement("div");
h.className="heart";
h.innerHTML=heartIcons[Math.floor(Math.random()*heartIcons.length)];

h.style.left=x+"px";
h.style.top=y+"px";
h.style.color=randomColor();

/* tính hướng bay mượt */
let angle=Math.random()*Math.PI*2;
let distance=burst?100+Math.random()*80:40+Math.random()*30;

let moveX=Math.cos(angle)*distance;
let moveY=Math.sin(angle)*distance;

h.style.setProperty("--moveX",moveX+"px");
h.style.setProperty("--moveY",moveY+"px");

document.body.appendChild(h);

setTimeout(()=>h.remove(),1100);
}

/* RÊ CHUỘT - GIỚI HẠN FPS */

document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});

/* ================= HEART ONLY WHEN MOVE ================= */

let heartCooldown = false;

document.addEventListener("mousemove", e => {

    if(!heartCooldown){
        createHeart(e.clientX, e.clientY, false);
        heartCooldown = true;

        setTimeout(() => {
            heartCooldown = false;
        }, 40); // ~25fps mượt
    }

});

/* CLICK - NỔ MƯỢT 360° */

document.addEventListener("click",e=>{
for(let i=0;i<40;i++){
setTimeout(()=>{
createHeart(e.clientX,e.clientY,true);
},i*5);
}
});

/* ================= MUSIC ================= */

function toggleMusic(){
let m=document.getElementById("bgMusic");
if(m.paused)m.play().catch(()=>{});else m.pause();
}

/* ================= VIDEO ================= */

function openVideo(){
document.getElementById("videoSlide").classList.add("active");
}

function closeVideo(){
document.getElementById("videoSlide").classList.remove("active");
}

/* ================= LETTER ================= */

function openLetter(){
document.getElementById("letterBox").classList.add("active");
}

function closeLetter(){
document.getElementById("letterBox").classList.remove("active");
}
</script>

</body>
</html>
