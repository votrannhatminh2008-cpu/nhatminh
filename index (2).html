<!DOCTYPE html>
<html lang="vi">
<head>
<link rel="preload" as="image" href="a.jpg">
<link rel="preload" as="image" href="b.jpg">
<link rel="preload" as="image" href="c.jpg">
<link rel="preload" as="image" href="d.jpg">
<link rel="preload" as="image" href="h.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A2(2023-2026)</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
    .card{
  position:relative;
  width:280px;
  overflow:hidden;
  border-radius:16px;
}

.card img{
  width:100%;
  display:block;
}

.caption{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:12px 16px;
  color:white;
  font-size:15px;
  line-height:1.4;
  text-align:center;

  background:linear-gradient(
    to top,
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.2),
    transparent
  );
}
    body.showGalaxy::before{
opacity:1;
}
    .music-blue{
background:linear-gradient(45deg,#00aaff,#0066ff);
box-shadow:0 0 20px #00aaff;
}
    .music-off{
background:linear-gradient(45deg,#00ff9d,#00c3ff);
box-shadow:0 0 20px #00ffd5;
}
.countdown{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:120px;
font-weight:900;
background:black;
color:white;
z-index:2000;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.countdown.show{
opacity:1;
}
/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
-webkit-tap-highlight-color:transparent;
}

/* ================= GALAXY BACKGROUND ================= */

body::before{
content:"";
position:fixed;
inset:0;
opacity:0;   /* thêm dòng này */
background:
radial-gradient(circle at 20% 30%,rgba(255,0,150,.35),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,200,255,.35),transparent 40%),
radial-gradient(circle at 50% 50%,rgba(120,0,255,.25),transparent 60%);
animation:nebula 25s linear infinite alternate;
z-index:-3;
transition:1s;
}

@keyframes nebula{
0%{transform:scale(1)}
100%{transform:scale(1.3)}
}

canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* ================= INTRO ================= */
.intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:1000;
}

.logo{
font-size:clamp(60px,12vw,150px);
font-weight:900;
letter-spacing:8px;
background:linear-gradient(270deg,#ff00cc,#00ffff,#ff66ff,#00ccff);
background-size:400% 400%;
-webkit-background-clip:text;
color:transparent;
animation:logoAppear 2.5s ease forwards,logoGradient 6s ease infinite;
}

@keyframes logoAppear{
0%{opacity:0;transform:scale(.6)}
100%{opacity:1;transform:scale(1)}
}

@keyframes logoGradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= HERO ================= */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:url("4.jpg") center/cover no-repeat;

position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
z-index:0;
pointer-events:none;
}

.hero h1,
.hero button{
position:relative;
z-index:2;
}
    

.hero.fade-out{
opacity:0;
transform:translate(-50%,-60%) scale(.8);
filter:blur(8px);
}

.hero.hide{
display:none;
}

.hero h1{
font-family:'Great Vibes',cursive;
letter-spacing:3px;
font-size:clamp(40px,8vw,80px);

color:white;

text-shadow:
0 0 10px rgba(255,255,255,0.8),
0 0 20px rgba(255,120,200,0.7),
0 0 40px rgba(251, 132, 203, 0.6);
}

@keyframes titleFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* ================= BUTTON ================= */

.btn{
padding:14px 32px;
border-radius:50px;
border:none;
background:linear-gradient(45deg,#ff4d88,#d63384);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;

animation:startGlow 1.5s infinite;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff4d88;
}

.btn:active{
transform:scale(.95);
}

.music-btn{position:fixed;bottom:15px;left:15px;display:none}
.process-btn{position:fixed;bottom:15px;right:15px;display:none}

/* ================= LETTER ================= */

.letter-btn{
position:fixed;
bottom:75px;
right:15px;
display:none;
background:linear-gradient(45deg,#ff66cc,#ff1493);
box-shadow:0 0 15px #ff66cc;
}

.letter-box{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.5s;
z-index:900;
}

.letter-box.active{
opacity:1;
pointer-events:auto;
}

.letter-content{
background:linear-gradient(135deg,#ff99cc,#ff66cc);
padding:40px;
border-radius:25px;
width:90%;
max-width:500px;
text-align:center;
color:white;
box-shadow:0 0 40px #ff66cc;
}

/* ================= FLOAT IMAGE ================= */

.float-img{
position:fixed;
width:170px;
height:250px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,100,255,.8);
animation:riseImage 8s linear forwards;
z-index:1;   
}

.float-img img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes riseImage{
0%{transform:translateY(110vh) scale(.8);opacity:0}
20%{opacity:1}
100%{transform:translateY(-30vh);opacity:0}
}

/* ================= WISH ================= */

.wish{
position:absolute;
bottom:0;
left:0;
width:100%;

padding:10px 14px;
font-size:12px;
font-weight:bold;

text-align:center;
line-height:1.4;

color:white;

background:linear-gradient(
to top,
rgba(0,0,0,0.85),
rgba(0,0,0,0.35),
transparent
);

text-shadow:
0 0 6px rgba(255,255,255,0.8),
0 0 12px rgba(255,105,180,0.6),
0 0 18px rgba(255,105,180,0.5);
z-index:5;
background:linear-gradient(
to top,
rgba(0,0,0,0.7),
transparent
);
z-index:5;
/* giới hạn chiều ngang */
padding:6px 12px;
font-size:18px;
text-align:center;    /* căn giữa chữ */
line-height:1.3;
word-wrap:break-word; /* tự xuống dòng */
animation:riseWish 7s linear forwards;
}

@keyframes riseWish{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-20vh);opacity:0}
}

/* ================= FLOWER ================= */

.flower{
position:fixed;
width:40px;
height:40px;
pointer-events:none;
animation:fall linear forwards;
background:none;
}

.flower img{
width:100%;
height:100%;
object-fit:contain;
background:transparent;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh);opacity:0}
}

/* ================= HEART ================= */

.heart{
position:fixed;
pointer-events:none;
font-size:16px;
will-change:transform,opacity;
animation:heartFly 1.1s cubic-bezier(.22,.68,.42,1) forwards;
filter:drop-shadow(0 0 6px currentColor);
}

@keyframes heartFly{
0%{
opacity:1;
transform:translate3d(0,0,0) scale(1);
}
100%{
opacity:0;
transform:translate3d(var(--moveX),var(--moveY),0) scale(1.5) rotate(360deg);
}
}

/* ================= VIDEO ================= */

.video-slide{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.6s;
z-index:2000;
}

.video-slide.active{
opacity:1;
pointer-events:auto;
}

.video-slide video{
width:100%;
height:100%;
object-fit:cover;
}

.video-controls{
position:absolute;
top:20px;
left:20px;
}
@keyframes startGlow{

0%{
opacity:1;
box-shadow:0 0 5px rgba(255,80,150,0.6);
}

50%{
opacity:0.8;
box-shadow:0 0 20px rgba(255,80,150,1);
}

100%{
opacity:1;
box-shadow:0 0 5px rgba(255,80,150,0.6);
}

}
</style>
</head>
<div id="countdown" class="countdown">3</div>
<body>

<div class="intro" id="intro">
<div class="logo" id="logo">12A2</div>
</div>

<canvas id="sky"></canvas>

<button class="btn music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>
<audio id="bgMusic" loop>
<source src="hi.mp3" type="audio/mpeg">
</audio>

<div class="hero" id="hero">
<h1>Chúc Mừng 08/03 </h1>
<br><br>
<button class="btn" onclick="startShow()">Bắt Đầu</button>
</div>

<button class="btn process-btn" id="processBtn" onclick="openVideo()">🎬 Xem Quá Trình</button>
<button class="btn letter-btn" id="letterBtn" onclick="openLetter()">💌 THƯ</button>

<div class="letter-box" id="letterBox">
<div class="letter-content">
<h2>💖 Thư Gửi 12A2 💖</h2>
<p>
Chúc tất cả các bạn nữ 12A2 luôn xinh đẹp, tự tin và hạnh phúc.
Mãi rực rỡ như bầu trời sao đêm nay 🌌✨
</p>
<br>
<button class="btn" onclick="closeLetter()">Đóng</button>
</div>
</div>

<div class="video-slide" id="videoSlide">
    <div class="video-controls">
        <button class="btn" onclick="closeVideo()">⬅ Quay Lại</button>
    </div>

    <video id="processVideo" controls playsinline>
        <source src="LINK_VIDEO.mp4" type="video/mp4">
    </video>
</div>

<script>

/* ================= INTRO FIX ================= */

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("logo").style.opacity="0";
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},1000);
},2500);
});

/* ================= STAR FIX ================= */

const canvas=document.getElementById("sky");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];
for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        s.y+=s.d;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}
draw();
/* ================= DATA ================= */

const people = [
{ img:"nn.jpg", text:"Chúc Ni lúc nào cũng lạc quan, vui vẻ và học ngày càng tốt hơn." },

{ img:"An An.jpg", text:"Chúc An lúc nào cũng vui vẻ, bình an như tên gọi và có thật nhiều kỷ niệm với lớp hi♥️" },

{ img:"Ý Nhi.jpg", text:"Chúc Ý Nhi một ngày 8/3 thật vui vẻ, hạnh phúc, mọi điều NHƯ Ý và luôn xinh đẹp rạng rỡ!" },

{ img:"Yến.jpg", text:"🌷 Chúc Yến 8/3 luôn rạng rỡ như hoa, cười thật nhiều và luôn tràn đầy năng lượng tích cực." },

{ img:"Bảo Hân.jpg", text:"Chúc Hân luôn tràn đầy năng lượng và giữ mãi sự nhiệt tình của mình." },

{ img:"Châu Anh.jpg", text:"Chúc Châu Anh luôn lấp lánh và tràn đầy năng lượng tích cực." },

{ img:"Châu Lê.jpg", text:"Chúc Châu Lê 8/3 luôn xinh đẹp theo cách rất riêng của mình." },

{ img:"Hồng.jpg", text:"Chúc đóa hoa Hồng của chúng ta mãi tỏa hương, khoe sắc rực rỡ." },

{ img:"Khánh Huyền.jpg", text:"Chúc Khánh Huyền 8/3 thật hạnh phúc và đạt nhiều thành tích tốt." },

{ img:"Lan Nhi.jpg", text:"Chúc Lan Nhi luôn xinh xắn đáng yêu và học thật tốt." },

{ img:"Ánh Lê.jpg", text:"✨ Chúc Ánh Lê 8/3 thật rạng rỡ, luôn vui vẻ và tỏa sáng!" },

{ img:"Nga.jpg", text:"🌷 Chúc Nga 8/3 luôn vui vẻ, xinh đẹp và nhiều may mắn!" },

{ img:"Ngân.jpg", text:"✨ Chúc Ngân 8/3 thật rạng rỡ và luôn tràn đầy năng lượng!" },

{ img:"Phương Ngọc.jpg", text:"🌸 Chúc Phương Ngọc 8/3 thật nhiều niềm vui và thành công!" },

{ img:"Ngọc Diễm.jpg", text:"💐 Chúc Diễm 8/3 luôn xinh đẹp, tự tin và tỏa sáng!" },

{ img:"Nhàn.jpg", text:"🌷 Chúc Nhàn 8/3 thật vui vẻ và luôn gặp nhiều may mắn!" },

{ img:"Như Ý.jpg", text:"✨ Chúc Như Ý 8/3 thật hạnh phúc và mọi điều luôn như ý!" },

{ img:"Thảo My.jpg", text:"🌸 Chúc Thảo My 8/3 luôn rạng rỡ và nhiều niềm vui!" },

{ img:"Thảo Như.jpg", text:"💐 Chúc Thảo Như 8/3 luôn vui vẻ và tràn đầy năng lượng!" },

{ img:"Thu Phương.jpg", text:"🌷 Chúc Thu Phương 8/3 thật rực rỡ và nhiều may mắn!" },

{ img:"Tường Anh.jpg", text:"✨ Chúc Tường Anh 8/3 luôn xinh đẹp và thật nhiều niềm vui!" },

{ img:"Văn Thảo.jpg", text:"🌸 Chúc Văn Thảo 8/3 luôn vui vẻ và tỏa sáng mỗi ngày!" },

{ img:"paochinh.jpg", text:"✨ Chúc Bảo Trinh 8/3 luôn rạng rỡ và tỏa sáng!" },

{ img:"Sue.jpg", text:"🌸 Chúc Sue 8/3 luôn vui vẻ, xinh đẹp và thật nhiều may mắn!" },

{ img:"Chim.jpg", text:"🌸 Chúc Yến Nhi 8/3 luôn vui vẻ, xinh đẹp và thật nhiều may mắn!" }
];

const heroImages = [
 "a.jpg",
 "b.jpg",
 "c.jpg",
 "d.jpg",
 "h.jpg"
];
heroImages.forEach(src=>{
let img = new Image();
img.src = src;
});
let bgIndex = 0;

setInterval(()=>{

bgIndex++;

if(bgIndex >= heroImages.length){
bgIndex = 0;
}

document.getElementById("hero").style.background =
`url(${heroImages[bgIndex]}) center/cover no-repeat`;

},3000);

/* ================= START ================= */

function startShow(){
    document.body.style.setProperty("--galaxy","1");
document.querySelector("body::before");
document.body.classList.add("showGalaxy");

let c = document.getElementById("countdown");
let hero = document.getElementById("hero");

let num = 3;

c.innerText = num;
c.classList.add("show");

/* NHẠC CHẠY KHI HIỆN SỐ 3 */
let music = document.getElementById("bgMusic");
music.currentTime = 0;
music.play().catch(()=>{});

let timer = setInterval(()=>{

num--;

if(num > 0){
c.innerText = num;
}else{
c.innerText = "GO";

setTimeout(()=>{

clearInterval(timer);

c.classList.remove("show");



setTimeout(()=>{
hero.classList.add("hide");

document.getElementById("musicBtn").style.display="block";
document.getElementById("processBtn").style.display="block";
document.getElementById("letterBtn").style.display="block";

},800);

},500);

}

},1000);



setTimeout(()=>{
document.getElementById("hero").classList.add("hide");
document.getElementById("musicBtn").style.display="block";
document.getElementById("processBtn").style.display="block";
document.getElementById("letterBtn").style.display="block";

setInterval(createPerson,1500);
setInterval(createFlower,800);

},1000);
}

function createPerson(){

let p = people[Math.floor(Math.random()*people.length)];

let box = document.createElement("div");
box.className = "float-img";
box.style.left = Math.random()*80 + "vw";

let img = document.createElement("img");
img.src = p.img;

let wish = document.createElement("div");
wish.className = "wish";
wish.innerHTML = p.text;

box.appendChild(img);
box.appendChild(wish);   // chữ nằm trong ảnh
document.body.appendChild(box);

setTimeout(()=>{
box.remove();
wish.remove();
},8000);

}

function createFlower(){

let f=document.createElement("div");
f.className="flower";

f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(6+Math.random()*3)+"s";

let img=document.createElement("img");

const flowers = ["cc.png"];
img.src = flowers[Math.floor(Math.random()*flowers.length)];

f.appendChild(img);

document.body.appendChild(f);

setTimeout(()=>{
f.remove();
},9000);

}

/* ================= SMOOTH RAINBOW HEART ================= */

const heartIcons=["💖","💗","💓","💘","💝","💞","❤️"];

let mouseX=0;
let mouseY=0;
let canSpawn=true;

function randomColor(){
return `hsl(${Math.random()*360},100%,60%)`;
}

function createHeart(x,y,burst=false){

let h=document.createElement("div");
h.className="heart";
h.innerHTML=heartIcons[Math.floor(Math.random()*heartIcons.length)];

h.style.left=x+"px";
h.style.top=y+"px";
h.style.color=randomColor();

/* tính hướng bay mượt */
let angle=Math.random()*Math.PI*2;
let distance=burst?100+Math.random()*80:40+Math.random()*30;

let moveX=Math.cos(angle)*distance;
let moveY=Math.sin(angle)*distance;

h.style.setProperty("--moveX",moveX+"px");
h.style.setProperty("--moveY",moveY+"px");

document.body.appendChild(h);

setTimeout(()=>h.remove(),1100);
}

/* RÊ CHUỘT - GIỚI HẠN FPS */

document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});

/* ================= HEART ONLY WHEN MOVE ================= */

let heartCooldown = false;

document.addEventListener("mousemove", e => {

    if(!heartCooldown){
        createHeart(e.clientX, e.clientY, false);
        heartCooldown = true;

        setTimeout(() => {
            heartCooldown = false;
        }, 40); // ~25fps mượt
    }

});

/* CLICK - NỔ MƯỢT 360° */

document.addEventListener("click",e=>{
for(let i=0;i<40;i++){
setTimeout(()=>{
createHeart(e.clientX,e.clientY,true);
},i*5);
}
});

/* ================= MUSIC ================= */

function toggleMusic(){

let m = document.getElementById("bgMusic");
let btn = document.getElementById("musicBtn");

if(m.paused){

m.play().catch(()=>{});
btn.style.background = "#ff4fa3"; // màu hồng khi bật nhạc

}else{

m.pause();
btn.style.background = "#00aaff"; // màu xanh khi tắt nhạc

}

}

/* ================= VIDEO ================= */

function openVideo(){
document.getElementById("videoSlide").classList.add("active");
}

function closeVideo(){
document.getElementById("videoSlide").classList.remove("active");
}

/* ================= LETTER ================= */

function openLetter(){
document.getElementById("letterBox").classList.add("active");
}

function closeLetter(){
document.getElementById("letterBox").classList.remove("active");
}
</script>

</body>
</html>
